<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      ;(function () {
        var l = window.location
        var base = l.pathname.split('/').slice(0, 2).join('/')
        var target = base + '/?p=' + encodeURIComponent(l.pathname.replace(base, '') + l.search + l.hash)
        l.replace(target)
      })()
    </script>
  </head>
  <body></body>
</html>
